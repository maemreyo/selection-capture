# Configuration for git-cliff
# https://git-cliff.org/docs/configuration

[changelog]
# Template for changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

# Template for each release
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}\
            {% if commit.links %} ({% for link in commit.links %}[{{link.text}}]({{link.href}}){% endfor %}){% endif %}
    {% endfor %}
{% endfor %}

{% if version %}
{% if previous.version %}
[{{ version | trim_start_matches(pat="v") }}]: https://github.com/maemreyo/selection-capture/compare/{{ previous.version }}..{{ version }}
{% endif %}
{% endif %}
"""

# Template for changelog footer
footer = """
<!-- generated by git-cliff -->
"""

# Remove leading and trailing whitespace from templates
trim = true

# Preprocessors
[preprocessors]

# Postprocessors
[postprocessors]

[git]
# Parse commits according to conventional commits spec
conventional_commits = true

# Filter out non-conventional commits
filter_unconventional = true

# Split commits by newlines
split_commits = false

# Regex to filter commits (case-sensitive)
filter_commits = false

# Glob pattern for tag matching
tag_pattern = "v[0-9]*"

# Regex pattern to skip commits
skip_tags = ""

# Tags to ignore
ignore_tags = ""

# Sort commits topologically
topo_order = false

# Sort commits within groups
sort_commits = true

# Order of commits (oldest/newest first)
order = "topological"

# Limit number of commits per release
limit_commits = 256

# Protect from breaking changes in parsing
protect_breaking_commits = false

# Commit parsers
[git.commit_parsers]
# feat commits -> Features
{ message = "^feat", group = "Features" }

# fix commits -> Bug Fixes
{ message = "^fix", group = "Bug Fixes" }

# perf commits -> Performance
{ message = "^perf", group = "Performance" }

# refactor commits -> Refactoring
{ message = "^refactor", group = "Refactoring" }

# docs commits -> Documentation
{ message = "^docs", group = "Documentation" }

# test commits -> Testing
{ message = "^test", group = "Testing" }

# chore commits -> Miscellaneous Tasks
{ message = "^chore", group = "Miscellaneous Tasks" }

# ci commits -> Continuous Integration
{ message = "^ci", group = "Continuous Integration" }

# style commits -> Styling
{ message = "^style", group = "Styling" }

# build commits -> Build System
{ message = "^build", group = "Build System" }

# revert commits -> Reverts
{ message = "^revert", group = "Reverts" }

# security commits -> Security
{ message = "^security", group = "Security" }

# BREAKING CHANGE in body
{ body = ".*BREAKING CHANGE.*", group = "BREAKING CHANGES" }

# Link parsers
[git.link_parsers]
# GitHub issue references (#123)
{ pattern = "#(\\d+)", href = "https://github.com/maemreyo/selection-capture/issues/$1" }

# GitHub pull request references (!123 or #123)
{ pattern = "!?(\\d+)", href = "https://github.com/maemreyo/selection-capture/pull/$1" }
